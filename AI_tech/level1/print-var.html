<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArabiaTech Variable</title>
<link rel="stylesheet" href="css_file.css">
    <link rel="stylesheet" href="background.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/skulpt/0.11.1/skulpt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/skulpt/0.11.1/skulpt-stdlib.js"></script>
    <script src="java_file.js"></script>
</head>
<body>
 

    <div class="container">
        <div class="editor-section">
            <div class="edit">
                
                
            </div>
            <button class="run-button" onclick="runCode()">
                <span style="font-size: 15px;">▶</span>
            </button>
            <textarea class="code-editor" id="codeEditor" placeholder="اكتب كود بايثون هنا...
مثال:
name = input('What is your name?')
age = int(input('How old are you?'))
height = float(input('Your height in meters?'))
print('Hello', name)
print('You are', age, 'years old')"></textarea>
            
            

<div class="examples">
    <h3>📚 أمثلة للتجربة:</h3>
        <div class="example-code" onclick="loadExample('x = 10\\nprint(\'The value of x is:\')\\nprint(x)')">
        x = 10<br>print("The value of x is:")<br>print(x)
    </div>

    <div class="example-code" onclick="loadExample('name = \'Sara\'\\nage = 12\\nprint(\'My name is\', name)\\nprint(\'My age is\', age)')">
        name = "Sara"<br>age = 12<br>print("My name is", name)<br>print("My age is", age)
    </div>

    <div class="example-code" onclick="loadExample('a = 5\\nb = 3\\nresult = a + b\\nprint(\'The result is:\', result)')">
        a = 5<br>b = 3<br>result = a + b<br>print("The result is:", result)
    </div>
</div>
</div>
 <div class="memory-section">
            <div class="memory-header">
               <span class="memory-title">الذاكرة</span>
                <img src="image/1.gif" alt="" width="50%">
            </div>
            
            <div class="memory-container" id="memoryContainer">
                <div class="welcome-message">
                    المتغيرات ستظهر هنا...
                </div>
            </div>
        </div>

        <div class="computer-section">
            <div class="computer-container">
                <svg class="computer-svg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                    <!-- Computer Base -->
                    <rect x="50" y="200" width="300" height="80" rx="10" fill="#2c3e50"/>
                    <rect x="60" y="210" width="280" height="60" rx="5" fill="#34495e"/>
                    
                    <!-- Computer Screen -->
                    <rect x="80" y="50" width="240" height="160" rx="15" fill="#1a1a1a"/>
                    <rect x="90" y="60" width="220" height="140" rx="8" fill="#000"/>
                    
                    <!-- Screen Bezel -->
                    <rect x="85" y="55" width="230" height="150" rx="12" fill="none" stroke="#333" stroke-width="2"/>
                    
                    <!-- Power Button -->
                    <circle cx="200" cy="235" r="8" fill="#e74c3c"/>
                    <circle cx="200" cy="235" r="5" fill="#c0392b"/>
                    
                    <!-- LED Indicators -->
                    <circle cx="180" cy="235" r="3" fill="#27ae60" opacity="0.8"/>
                    <circle cx="220" cy="235" r="3" fill="#3498db" opacity="0.6"/>
                    
                    <!-- Keyboard suggestion -->
                    <rect x="100" y="250" width="200" height="20" rx="3" fill="#7f8c8d"/>
                    
                    <!-- Brand Logo -->
                    <text x="200" y="225" text-anchor="middle" fill="#95a5a6" font-size="8" font-family="Arial">PyKids</text>
                </svg>
                
                <div class="screen-output" id="output">
                    <div class="welcome-message">
                        مرحباً بك! اكتب كودك وشاهد النتيجة هنا...
                    </div>
                </div>
            </div>
        </div>

       
    </div>
</body>
</html>
