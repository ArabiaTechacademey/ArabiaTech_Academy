<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار CSS — كورس كامل</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  background: #f0f4f8;
  color: #1a202c;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── TOP BAR ─── */
.topbar {
  background: #ffffff;
  color: rgb(44, 44, 44);
  padding: 0 24px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  position: sticky; top:0; z-index:200;
}

.topbar-title {
  font-size: 1.1rem;
  font-weight: 700;
  
  align-items: center;
  gap: 10px;
}

.topbar-title span {
  background: rgba(255,255,255,0.2);
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.85rem;
}

/* ─── LAYOUT ─── */
.layout {
  display: flex;
  flex: 1;
  gap: 0;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 280px;
  background: white;
  border-right: 1px solid #e2e8f0;
  flex-shrink: 0;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }

.sidebar-header {
  background: #1565c0;
  color: white;
  padding: 16px 20px;
  text-align: center;
}

.sidebar-header h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.sidebar-header p {
  font-size: 0.78rem;
  opacity: 0.8;
}

.topic-list {
  flex: 1;
  padding: 8px;
}

.topic-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  border: 1px solid transparent;
}

.topic-item:hover {
  background: #f0f7ff;
  border-color: #bee3f8;
}

.topic-item.active {
  background: #ebf4ff;
  border-color: #1565c0;
}

.topic-item.done .topic-num-badge {
  background: #38a169;
}

.topic-item.done .topic-name {
  color: #38a169;
}

.topic-num-badge {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #1565c0;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  flex-shrink: 0;
}

.topic-item.active .topic-num-badge {
  background: #1565c0;
  box-shadow: 0 0 0 3px rgba(21,101,192,0.25);
}

.topic-info {
  flex: 1;
  text-align: right;
}

.topic-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: #2d3748;
  margin-bottom: 2px;
}

.topic-item.active .topic-name {
  color: #1565c0;
}

.topic-count {
  font-size: 0.72rem;
  color: #718096;
}

/* ─── MAIN ─── */
.main {
  flex: 1;
  padding: 28px 32px;
  max-width: 900px;
}

/* ─── QUIZ HEADER ─── */
.quiz-header {
  background: white;
  border-radius: 14px;
  padding: 28px 32px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  text-align: center;
}

.quiz-header h1 {
  font-size: 1.6rem;
  font-weight: 900;
  color: #1a202c;
  margin-bottom: 6px;
}

.quiz-header p {
  color: #718096;
  font-size: 0.9rem;
}

/* ─── PROGRESS BAR ─── */
.progress-card {
  background: white;
  border-radius: 14px;
  padding: 16px 24px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  gap: 16px;
}

.progress-label {
  font-size: 0.82rem;
  color: #718096;
  white-space: nowrap;
}

.progress-bar-wrap {
  flex: 1;
  height: 8px;
  background: #e2e8f0;
  border-radius: 99px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #1565c0, #42a5f5);
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-count {
  font-weight: 700;
  font-size: 0.85rem;
  color: #2d3748;
  white-space: nowrap;
}

/* ─── QUESTION CARD ─── */
.question-card {
  background: white;
  border-radius: 14px;
  padding: 28px 32px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.q-badge {
  background: #1565c0;
  color: white;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 20px;
}

.q-diff-badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}

.q-diff-badge.easy { background: #c6f6d5; color: #276749; }
.q-diff-badge.med  { background: #fefcbf; color: #744210; }
.q-diff-badge.hard { background: #fed7d7; color: #742a2a; }

.q-text {
  font-size: 1.05rem;
  font-weight: 700;
  color: #1a202c;
  text-align: right;
  line-height: 1.7;
  margin-bottom: 20px;
}

.q-text code {
  font-family: 'IBM Plex Mono', monospace;
  background: #f7fafc;
  border: 1px solid #e2e8f0;
  padding: 2px 7px;
  border-radius: 5px;
  color: #dd6b20;
  font-size: 0.85rem;
  font-weight: 400;
}

/* ─── OPTIONS ─── */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  background: #f7fafc;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  padding: 14px 20px;
  text-align: right;
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.92rem;
  color: #2d3748;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-direction: row-reverse;
}

.option-btn:hover:not(:disabled) {
  border-color: #1565c0;
  background: #ebf4ff;
  color: #1565c0;
}

.option-btn.correct {
  border-color: #38a169;
  background: #f0fff4;
  color: #276749;
}

.option-btn.wrong {
  border-color: #e53e3e;
  background: #fff5f5;
  color: #742a2a;
}

.option-btn:disabled { cursor: default; }

.opt-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid #cbd5e0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: #718096;
  flex-shrink: 0;
  transition: all 0.15s;
}

.option-btn:hover:not(:disabled) .opt-icon {
  border-color: #1565c0;
  color: #1565c0;
}

.option-btn.correct .opt-icon {
  border-color: #38a169;
  background: #38a169;
  color: white;
}

.option-btn.wrong .opt-icon {
  border-color: #e53e3e;
  background: #e53e3e;
  color: white;
}

/* ─── FEEDBACK ─── */
.feedback {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.85rem;
  line-height: 1.6;
  display: none;
}

.feedback.show { display: block; }
.feedback.ok  { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
.feedback.err { background: #fff5f5; border: 1px solid #feb2b2; color: #742a2a; }

/* ─── NAV BUTTONS ─── */
.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 24px;
}

.nav-btn {
  background: white;
  border: 2px solid #e2e8f0;
  color: #2d3748;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn:hover {
  border-color: #1565c0;
  color: #1565c0;
}

.nav-btn:disabled {
  opacity: 0.4;
  cursor: default;
}

.nav-btn.primary {
  background: #1565c0;
  border-color: #1565c0;
  color: white;
}

.nav-btn.primary:hover {
  background: #1251a3;
  color: white;
}

.q-counter {
  font-size: 0.88rem;
  color: #718096;
  font-weight: 500;
}

/* ─── RESULT CARD ─── */
.result-card {
  background: white;
  border-radius: 14px;
  padding: 40px 32px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  text-align: center;
  display: none;
}

.result-card.show { display: block; }

.result-score-circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1565c0, #42a5f5);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(21,101,192,0.35);
}

.result-score-num {
  font-size: 1.8rem;
  font-weight: 900;
  line-height: 1;
}

.result-score-label {
  font-size: 0.72rem;
  opacity: 0.85;
}

.result-card h2 {
  font-size: 1.4rem;
  font-weight: 900;
  margin-bottom: 8px;
}

.result-card p {
  color: #718096;
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.result-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 28px;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-size: 1.5rem;
  font-weight: 900;
  color: #1565c0;
}

.stat-lbl {
  font-size: 0.75rem;
  color: #718096;
}

.result-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-retry {
  background: white;
  border: 2px solid #1565c0;
  color: #1565c0;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 12px 28px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-retry:hover { background: #ebf4ff; }

.btn-next-topic {
  background: #1565c0;
  border: 2px solid #1565c0;
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 12px 28px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-next-topic:hover { background: #1251a3; }

/* ─── DOTS ─── */
.q-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.q-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #e2e8f0;
  transition: all 0.2s;
  cursor: pointer;
}

.q-dot.answered { background: #48bb78; }
.q-dot.wrong-dot { background: #fc8181; }
.q-dot.current { background: #1565c0; transform: scale(1.3); }

@media (max-width: 760px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; max-height: 220px; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    منصة الاختبارات التعليمية
    <p style="color: #2d3748;opacity: .9;font-weight: 100; font-family: Arial, Helvetica, sans-serif;">Css course</p>
    <span id="total-score-display">0 نقطة</span>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>قائمة المواضيع</h3>
      <p id="sidebar-subtitle">20 موضوعاً تعليمياً</p>
    </div>
    <div class="topic-list" id="topic-list"></div>
  </aside>

  <main class="main">
    <div class="quiz-header" id="quiz-header">
      <h1 id="quiz-title">اختبار: المقدمة</h1>
      <p id="quiz-subtitle">10 أسئلة</p>
    </div>

    <div class="progress-card">
      <span class="progress-label">التقدم في الاختبار</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="progress-count" id="progress-count">0 / 10</span>
    </div>

    <div class="q-dots" id="q-dots"></div>

    <div class="question-card" id="question-card">
      <div class="q-header">
        <div class="q-badge" id="q-badge">السؤال 1 من 10</div>
        <div class="q-diff-badge easy" id="q-diff">سهل</div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="nav-row" id="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="prevQ()">→ السابق</button>
      <span class="q-counter" id="q-counter">1 / 10</span>
      <button class="nav-btn primary" id="btn-next" onclick="nextQ()">التالي ←</button>
    </div>

    <div class="result-card" id="result-card">
      <div class="result-score-circle">
        <div class="result-score-num" id="res-pct">0%</div>
        <div class="result-score-label">نتيجتك</div>
      </div>
      <h2 id="res-title">أحسنت!</h2>
      <p id="res-desc">لقد أتممت الاختبار</p>
      <div class="result-stats">
        <div class="stat-item">
          <div class="stat-num" id="res-correct">0</div>
          <div class="stat-lbl">إجابة صحيحة</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="res-wrong">0</div>
          <div class="stat-lbl">إجابة خاطئة</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="res-pts">0</div>
          <div class="stat-lbl">نقطة مكتسبة</div>
        </div>
      </div>
      <div class="result-btns">
        <button class="btn-retry" onclick="retryTopic()">↺ إعادة المحاولة</button>
        <button class="btn-next-topic" id="btn-next-topic" onclick="nextTopic()">الموضوع التالي ←</button>
      </div>
    </div>
  </main>
</div>

<script>
const topics = [
{
  id:1, title:"المقدمة",
  questions:[
    {q:"ما اختصار كلمة CSS؟", diff:"easy", opts:["Creative Style Sheets","Cascading Style Sheets","Custom Style Script","Computer Style Sheets"], ans:1, exp:"CSS تعني Cascading Style Sheets — صحيفات الأنماط المتتالية."},
    {q:"أي طريقة تُعدّ الأفضل لتنظيم الكود؟", diff:"easy", opts:["Inline style","داخل &lt;style&gt; في نفس الصفحة","ملف .css خارجي مربوط بـ &lt;link&gt;","داخل JavaScript"], ans:2, exp:"الملف الخارجي أفضل لأنه يفصل HTML عن CSS ويسهّل الصيانة."},
    {q:"ما الخاصية الصحيحة لتلوين نص فقرة بالأحمر؟", diff:"easy", opts:["font-color: red","text-color: red","color: red","style: red"], ans:2, exp:"الخاصية الصحيحة هي color: red"},
    {q:"كيف يُكتب تعليق في CSS؟", diff:"easy", opts:["// تعليق","<!-- تعليق -->","/* تعليق */","# تعليق"], ans:2, exp:"تعليقات CSS تُكتب بين /* و */"},
    {q:"ما الطريقة الصحيحة لتحديد عنصر بـ id في CSS؟", diff:"med", opts:[".myId",":myId","#myId","id=myId"], ans:2, exp:"الـ # يُستخدم لاستهداف عناصر الـ id."},
    {q:"ما الطريقة الصحيحة لتحديد عنصر بـ class في CSS؟", diff:"easy", opts:[".myClass","#myClass",":myClass","*myClass"], ans:0, exp:"النقطة . تُستخدم لاستهداف عناصر الـ class."},
    {q:"ما الخاصية التي تحدد شفافية العنصر كاملاً؟", diff:"med", opts:["transparency","visibility","opacity","alpha"], ans:2, exp:"opacity تتحكم في شفافية العنصر من 0 (شفاف) إلى 1 (معتم)."},
    {q:"ما معنى الـ Cascade في CSS؟", diff:"med", opts:["ترتيب الملفات الخارجية","الأولوية والتتالي في تطبيق الأنماط","سرعة تحميل الصفحة","ترتيب العناصر في HTML"], ans:1, exp:"Cascade تعني تتالي الأنماط — عند تعارض قواعد، تُطبَّق الأكثر خصوصية أو الأحدث."},
    {q:"ما الـ selector الذي يستهدف جميع عناصر الصفحة؟", diff:"easy", opts:["all","*","body","html"], ans:1, exp:"* (النجمة) تستهدف جميع عناصر الصفحة — تُسمى Universal Selector."},
    {q:"أي من هذه الأنماط لها أعلى خصوصية (Specificity)؟", diff:"hard", opts:["p { color: red }",".text { color: red }","#title { color: red }","* { color: red }"], ans:2, exp:"الـ id له أعلى خصوصية من class من tag. الترتيب: inline > id > class > tag."},
  ]
},
{
  id:2, title:"Fonts (1)",
  questions:[
    {q:"ما الخاصية المستخدمة لتغيير نوع الخط؟", diff:"easy", opts:["text-family","font-type","font-family","font-name"], ans:2, exp:"font-family هي الخاصية الصحيحة لتحديد نوع/عائلة الخط."},
    {q:"ما قيمة font-weight للنص الغامق (Bold)؟", diff:"easy", opts:["100","400","600","700"], ans:3, exp:"700 تعني bold. 400 هي العادي normal."},
    {q:"ما الفرق بين rem وpx في font-size؟", diff:"med", opts:["لا فرق بينهما","rem نسبي بالنسبة للعنصر الجذر، px ثابت","rem ثابت وpx نسبي","rem أكبر دائماً من px"], ans:1, exp:"rem نسبي لحجم خط الـ root (html)، بينما px ثابت ولا يتأثر."},
    {q:"ما القيمة التي تجعل الخط مائلاً؟", diff:"easy", opts:["font-weight: italic","font-style: oblique","font-style: italic","text-style: italic"], ans:2, exp:"font-style: italic تجعل الخط مائلاً."},
    {q:"ما الوحدة النسبية التي تعتمد على حجم خط العنصر الأب؟", diff:"med", opts:["rem","vw","em","px"], ans:2, exp:"em تعتمد على حجم خط العنصر الأب، بعكس rem التي تعتمد على الجذر."},
    {q:"ما خاصية CSS لتحميل خط خارجي مخصص؟", diff:"med", opts:["@import-font","font-face","@font-face","@custom-font"], ans:2, exp:"@font-face تُستخدم لتحميل وتسجيل خطوط مخصصة."},
    {q:"ما قيمة font-style للنص العادي غير المائل؟", diff:"easy", opts:["regular","normal","default","straight"], ans:1, exp:"font-style: normal هي القيمة الافتراضية للنص العادي."},
    {q:"ما الخاصية لجعل النص صغيراً جداً (thin)؟", diff:"med", opts:["font-weight: 100","font-size: thin","font-weight: light","font-thin: true"], ans:0, exp:"font-weight: 100 هي أدق سماكة متاحة للخط."},
    {q:"ما خاصية CSS للتحكم في الحروف الصغيرة/الكبيرة (small caps)؟", diff:"hard", opts:["text-transform: small-caps","font-variant: small-caps","font-style: caps","letter-case: small"], ans:1, exp:"font-variant: small-caps تحوّل الحروف الصغيرة إلى نسخة صغيرة من الكبيرة."},
    {q:"ما وحدة القياس المرتبطة بعرض نافذة المتصفح؟", diff:"med", opts:["em","vh","vw","rem"], ans:2, exp:"vw = viewport width، حيث 1vw = 1% من عرض نافذة المتصفح."},
  ]
},
{
  id:3, title:"Fonts (2) — Text",

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let currentTopicIdx = 0;
let currentQIdx = 0;
let answers = {};
let topicDone = {};
let totalScore = 0;

function init() {
  renderSidebar();
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('number') || params.get('id') || params.get('n');
  let startIdx = 0;
  if (raw !== null) {
    const num = parseInt(raw, 10);
    const found = topics.findIndex(t => t.id === num);
    if (found !== -1) startIdx = found;
  }
  loadTopic(startIdx);
}

function renderSidebar() {
  const list = document.getElementById('topic-list');
  list.innerHTML = topics.map((t, i) => `
    <div class="topic-item ${i===currentTopicIdx?'active':''} ${topicDone[i]?'done':''}" onclick="loadTopic(${i})">
      <div class="topic-info">
        <div class="topic-name">${t.title}</div>
        <div class="topic-count">${t.questions.length} سؤال</div>
      </div>
      <div class="topic-num-badge">${topicDone[i]?'✓':t.id}</div>
    </div>
  `).join('');
}

function loadTopic(idx) {
  currentTopicIdx = idx;
  currentQIdx = 0;
  if (!answers[idx]) answers[idx] = {};
  renderSidebar();
  renderQuestion();
  showQuizUI();
}

function showQuizUI() {
  document.getElementById('question-card').style.display = 'block';
  document.getElementById('nav-row').style.display = 'flex';
  document.getElementById('result-card').classList.remove('show');
}

function renderQuestion() {
  const t = topics[currentTopicIdx];
  const q = t.questions[currentQIdx];
  const totalQ = t.questions.length;
  const ans = answers[currentTopicIdx];

  document.getElementById('quiz-title').textContent = `اختبار: ${t.title}`;
  document.getElementById('quiz-subtitle').textContent = `${totalQ} أسئلة`;

  const answered = Object.keys(ans).length;
  const pct = Math.round(answered / totalQ * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = `${answered} / ${totalQ}`;

  document.getElementById('q-dots').innerHTML = t.questions.map((_, i) => {
    let cls = '';
    if (i === currentQIdx) cls = 'current';
    else if (ans[i] !== undefined) {
      cls = ans[i] === t.questions[i].ans ? 'answered' : 'wrong-dot';
    }
    return `<div class="q-dot ${cls}" onclick="gotoQ(${i})"></div>`;
  }).join('');

  document.getElementById('q-badge').textContent = `السؤال ${currentQIdx+1} من ${totalQ}`;
  const diffMap = {easy:'سهل',med:'متوسط',hard:'صعب'};
  const diffEl = document.getElementById('q-diff');
  diffEl.textContent = diffMap[q.diff];
  diffEl.className = `q-diff-badge ${q.diff}`;
  document.getElementById('q-text').innerHTML = q.q;

  const letters = ['A','B','C','D'];
  const chosen = ans[currentQIdx];
  document.getElementById('options').innerHTML = q.opts.map((o, j) => {
    let cls = '';
    if (chosen !== undefined) {
      if (j === q.ans) cls = 'correct';
      else if (j === chosen && chosen !== q.ans) cls = 'wrong';
    }
    return `<button class="option-btn ${cls}" ${chosen!==undefined?'disabled':''} onclick="answerQ(${j})">
      <span>${o}</span>
      <div class="opt-icon">${chosen!==undefined && j===q.ans?'✓':chosen===j&&j!==q.ans?'✗':letters[j]}</div>
    </button>`;
  }).join('');

  const fb = document.getElementById('feedback');
  if (chosen !== undefined) {
    const ok = chosen === q.ans;
    fb.className = `feedback show ${ok?'ok':'err'}`;
    fb.textContent = (ok?'✅ ':' ❌ ') + q.exp;
  } else {
    fb.className = 'feedback';
    fb.textContent = '';
  }

  document.getElementById('q-counter').textContent = `${currentQIdx+1} / ${totalQ}`;
  document.getElementById('btn-prev').disabled = currentQIdx === 0;
  const isLast = currentQIdx === totalQ - 1;
  const nextBtn = document.getElementById('btn-next');
  if (isLast) {
    nextBtn.textContent = 'إنهاء الاختبار ✓';
    nextBtn.onclick = () => showResult();
  } else {
    nextBtn.textContent = 'التالي ←';
    nextBtn.onclick = () => nextQ();
  }
}

function answerQ(j) {
  if (answers[currentTopicIdx][currentQIdx] !== undefined) return;
  const q = topics[currentTopicIdx].questions[currentQIdx];
  answers[currentTopicIdx][currentQIdx] = j;
  if (j === q.ans) totalScore += 10;
  updateTopScore();
  renderQuestion();
}

function gotoQ(i) { currentQIdx = i; renderQuestion(); }
function prevQ() { if (currentQIdx > 0) { currentQIdx--; renderQuestion(); } }
function nextQ() {
  if (currentQIdx < topics[currentTopicIdx].questions.length - 1) {
    currentQIdx++;
    renderQuestion();
  }
}

function showResult() {
  const t = topics[currentTopicIdx];
  const ans = answers[currentTopicIdx];
  let correct = 0, wrong = 0;
  t.questions.forEach((q, i) => {
    if (ans[i] === q.ans) correct++;
    else if (ans[i] !== undefined) wrong++;
  });
  const pct = Math.round(correct / t.questions.length * 100);
  topicDone[currentTopicIdx] = true;
  renderSidebar();

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-pts').textContent = correct * 10;
  document.getElementById('res-title').textContent = pct >= 80 ? '🎉 أحسنت!' : pct >= 50 ? '👍 جيد، يمكنك التحسن!' : '📚 راجع الموضوع مرة أخرى';
  document.getElementById('res-desc').textContent = `أجبت على ${correct} من ${t.questions.length} أسئلة بشكل صحيح`;

  const nextBtn = document.getElementById('btn-next-topic');
  if (currentTopicIdx < topics.length - 1) {
    nextBtn.textContent = `الموضوع التالي: ${topics[currentTopicIdx+1].title} ←`;
    nextBtn.style.display = '';
  } else {
    nextBtn.textContent = '🏆 أنهيت الكورس!';
  }

  document.getElementById('question-card').style.display = 'none';
  document.getElementById('nav-row').style.display = 'none';
  document.getElementById('result-card').classList.add('show');

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-count').textContent = `${t.questions.length} / ${t.questions.length}`;
}

function retryTopic() {
  answers[currentTopicIdx] = {};
  topicDone[currentTopicIdx] = false;
  loadTopic(currentTopicIdx);
}

function nextTopic() {
  if (currentTopicIdx < topics.length - 1) {
    loadTopic(currentTopicIdx + 1);
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function updateTopScore() {
  document.getElementById('total-score-display').textContent = totalScore + ' نقطة';
}

init();
</script>
