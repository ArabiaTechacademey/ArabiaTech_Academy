
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArabiaTech - تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --yellow:#f5c518;--yellow-dark:#e0a800;
  --black:#1a1a1a;--white:#ffffff;
  --border:#e0e0e0;--text:#222;--muted:#888;
  --red:#e74c3c;--bg:#f5f5f5;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;display:flex;flex-direction:column;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-size:1.3rem;font-weight:900;color:var(--black);display:flex;align-items:center;flex-shrink:0;}
.logo-badge{background:var(--yellow);border-radius:6px;padding:1px 6px;font-size:.95rem;margin-right:3px;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{text-decoration:none;color:var(--text);font-size:.85rem;font-weight:600;white-space:nowrap;}
.nav-links a:hover{color:var(--yellow-dark);}
.btn-contact{background:var(--yellow);color:var(--black);border:none;padding:7px 16px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.btn-contact:hover{background:var(--yellow-dark);}

/* hide nav links on mobile */
@media(max-width:640px){
  .nav-links{display:none;}
  nav{padding:0 16px;}
  .logo{font-size:1.15rem;}
}

/* CENTER */
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px;}

/* CARD */
.login-card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:36px 32px 32px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,.08);animation:fadeUp .4s ease both;}

@media(max-width:480px){
  .login-card{padding:28px 20px 24px;border-radius:14px;}
  .center{padding:20px 12px;align-items:flex-start;padding-top:28px;}
}

.login-logo{text-align:center;margin-bottom:24px;}
.login-logo .brand{font-size:1.5rem;font-weight:900;color:var(--black);}
.login-logo .brand span{background:var(--yellow);border-radius:6px;padding:1px 8px;font-size:1rem;margin-right:3px;}
.login-logo p{color:var(--muted);font-size:.85rem;margin-top:6px;line-height:1.5;}

.divider{height:1px;background:var(--border);margin:0 -32px 24px;}
@media(max-width:480px){.divider{margin:0 -20px 20px;}}

.field-label{display:block;font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:8px;}
.field-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Cairo',sans-serif;font-size:1rem;color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;direction:ltr;text-align:right;}
.field-input:focus{border-color:var(--yellow-dark);box-shadow:0 0 0 3px rgba(224,168,0,.15);}
.field-input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(231,76,60,.1);}

.error-msg{display:none;color:var(--red);font-size:.82rem;font-weight:600;margin-top:8px;align-items:center;gap:5px;}
.error-msg.show{display:flex;}

.btn-login{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;margin-top:20px;background:var(--yellow);color:var(--black);border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;}
.btn-login:hover{background:var(--yellow-dark);transform:translateY(-1px);box-shadow:0 4px 18px rgba(224,168,0,.35);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{background:#e0e0e0;color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}

.btn-spinner{width:18px;height:18px;border:3px solid rgba(0,0,0,.2);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite;display:none;}
.btn-login.loading .btn-spinner{display:block;}
.btn-login.loading .btn-text{opacity:.5;}

.success-box{display:none;flex-direction:column;align-items:center;gap:10px;margin-top:16px;padding:14px;background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.3);border-radius:10px;color:#27ae60;font-weight:700;font-size:.9rem;text-align:center;}
.success-box.show{display:flex;}
.success-icon{font-size:1.8rem;}

.hint{margin-top:18px;text-align:center;font-size:.78rem;color:var(--muted);line-height:1.6;}
.hint strong{color:var(--yellow-dark);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>

<nav>
  <div class="logo">ArabiaTech<span class="logo-badge">i</span></div>
  <ul class="nav-links">
    <li><a href="#">الصفحة الرئيسيه</a></li>
    <li><a href="#">كورسات</a></li>
    <li><a href="#">لماذا أرابيا تك</a></li>
    <li><a href="#">من نحن</a></li>
  </ul>
  <button class="btn-contact">تواصل معنا</button>
</nav>

<div class="center">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">ArabiaTech<span>i</span></div>
      <p>أدخل كود الطالب للدخول إلى ملفك الشخصي</p>
    </div>
    <div class="divider"></div>
    <label class="field-label" for="studentId">🪪 كود الطالب</label>
    <input class="field-input" id="studentId" type="text" placeholder="مثال: AWER1135" autocomplete="off" spellcheck="false"/>
    <div class="error-msg" id="errorMsg">
      <span>⚠️</span>
      <span id="errorText">كود الطالب غير صحيح، حاول مرة أخرى.</span>
    </div>
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <div class="btn-spinner"></div>
      <span class="btn-text">دخول ←</span>
    </button>
    <div class="success-box" id="successBox">
      <span class="success-icon">✅</span>
      <span id="successText">تم التحقق! جارٍ التحويل…</span>
    </div>
    <p class="hint">الكود الخاص بك موجود في رسالة التسجيل.<br/>للمساعدة تواصل مع <strong>ArabiaTech</strong></p>
  </div>
</div>

<script>
const input=document.getElementById('studentId');
const btn=document.getElementById('loginBtn');
const errorMsg=document.getElementById('errorMsg');
const errorText=document.getElementById('errorText');
const successBox=document.getElementById('successBox');
const successTxt=document.getElementById('successText');

input.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
input.addEventListener('input',()=>{
  input.classList.remove('error');
  errorMsg.classList.remove('show');
  successBox.classList.remove('show');
});

function handleLogin(){
  const id=input.value.trim().toUpperCase();
  if(!id){showError('من فضلك أدخل كود الطالب أولاً.');return;}
  setLoading(true);
  fetch('data.json')
    .then(res=>{if(!res.ok)throw new Error('network');return res.json();})
    .then(data=>{
      const student=data.students.find(s=>s.id===id);
      if(!student){setLoading(false);showError('كود الطالب غير موجود، تأكد من الكود وحاول مرة أخرى.');return;}
      setLoading(false);
      input.classList.remove('error');
      errorMsg.classList.remove('show');
      successTxt.textContent=`أهلاً ${student.name}! جارٍ التحويل…`;
      successBox.classList.add('show');
      btn.disabled=true;
      setTimeout(()=>{
        sessionStorage.setItem('loggedStudentId',student.id);
        window.location.href='Student_profile.html';
      },1400);
    })
    .catch(()=>{setLoading(false);showError('تعذّر الاتصال بقاعدة البيانات، تأكد من وجود ملف data.json.');});
}

function showError(msg){
  errorText.textContent=msg;
  input.classList.add('error');
  errorMsg.classList.add('show');
  input.classList.remove('shake');
  void input.offsetWidth;
  input.classList.add('shake');
}
function setLoading(on){btn.disabled=on;btn.classList.toggle('loading',on);}
</script>
</body>
</html>
