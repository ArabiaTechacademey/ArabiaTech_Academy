<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مواعيد الطلاب</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf2;
    --muted: #7a80a0;
    --accent: #4f8ef7;
    --accent2: #38c98e;
    --gold: #f0b840;
    --red: #e05c5c;
    --ai-color: #4f8ef7;
    --web-color: #38c98e;
    --private-color: #f0b840;
  }

  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ═══════ LOGIN ═══════ */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem; background: var(--bg); position: relative; overflow: hidden;
  }
  #loginScreen::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  #loginScreen::after {
    content: ''; position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(79,142,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 20px;
    padding: 2.5rem 2rem; width: 100%; max-width: 400px; position: relative; z-index: 1;
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  .login-logo {
    width: 52px; height: 52px; background: rgba(79,142,247,0.15);
    border: 1px solid rgba(79,142,247,0.3); border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    margin: 0 auto 1.25rem;
  }
  .login-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .login-sub   { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 2rem; }
  .field-group { margin-bottom: 1rem; }
  .field-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; }
  .field-group input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; padding: 10px 14px; font-family: 'Cairo', sans-serif;
    font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s;
    direction: ltr; text-align: left;
  }
  .field-group input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; margin-top: 1.5rem; padding: 12px; background: var(--accent); border: none;
    border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    color: #fff; cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error {
    display: none; margin-top: 1rem; padding: 10px 14px;
    background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.3);
    border-radius: 8px; font-size: 13px; color: var(--red); text-align: center;
  }
  .login-error.show { display: block; animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ═══════ DASHBOARD ═══════ */
  #dashboard { display: none; }

  /* NAV TABS */
  .nav-tabs {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; gap: 0; padding: 0 2rem;
  }
  .nav-tab {
    padding: 12px 18px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    margin-bottom: -1px;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* TOP BAR */
  .top-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1.1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
  }
  .top-bar h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .top-bar h1 span { color: var(--accent); }
  .top-bar .subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .live-dot { width: 7px; height: 7px; background: var(--accent2); border-radius: 50%; display: inline-block; margin-left: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .logout-btn {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border2);
    background: transparent; font-family: 'Cairo', sans-serif; font-size: 12px;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* STATS */
  .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat-item { background: var(--surface); padding: 1rem 1.5rem; text-align: center; }
  .stat-num  { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-lbl  { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* FILTERS */
  .filters-wrap {
    padding: 0.85rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .filters-wrap label { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .filter-btn {
    padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border2);
    background: transparent; font-family: 'Cairo', sans-serif; font-size: 12px;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.active.web  { background: var(--web-color); border-color: var(--web-color); }
  .filter-btn.active.gold { background: var(--gold); border-color: var(--gold); color: #1a1a1a; }
  .search-wrap { margin-right: auto; }
  .search-wrap input {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
    padding: 6px 12px; font-family: 'Cairo', sans-serif; font-size: 13px; color: var(--text);
    width: 200px; outline: none; direction: rtl;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* MAIN */
  .main { padding: 1.5rem 2rem 3rem; }

  /* ═══════ COURSES PAGE ═══════ */
  #coursesPage { display: none; padding: 1.5rem 2rem 3rem; }

  .spec-section { margin-bottom: 2.5rem; animation: fadeIn 0.3s ease; }
  .spec-header  { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; }
  .spec-name    { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .spec-line    { flex: 1; height: 1px; background: var(--border); }
  .spec-count   { font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; }

  .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }

  .course-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.2rem 1.2rem 1rem; position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .course-card::before {
    content: ''; position: absolute; top: 0; right: 0; width: 3px; height: 100%;
    background: var(--c-color, var(--border)); border-radius: 0 14px 14px 0;
  }
  .course-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .course-card-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 10px;
    background: rgba(255,255,255,0.05);
  }
  .course-card-name  { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .course-card-rank  { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .course-card-meta  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .course-card-dur   { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .course-card-key   {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border2); color: var(--muted);
    letter-spacing: 0.05em; direction: ltr;
  }
  .course-card-link  {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px; border-radius: 8px; border: 1px solid var(--border2);
    background: transparent; font-family: 'Cairo', sans-serif; font-size: 12px;
    font-weight: 600; color: var(--accent); cursor: pointer; text-decoration: none;
    transition: all 0.15s; width: 100%; text-align: center;
  }
  .course-card-link:hover { background: rgba(79,142,247,0.1); border-color: var(--accent); }

  /* specialty colors */
  .spec-web  { --c-color: var(--web-color); }
  .spec-ai   { --c-color: var(--ai-color);  }
  .spec-kids { --c-color: var(--gold);       }

  /* course icon backgrounds */
  .icon-web  { background: rgba(56,201,142,0.12) !important; }
  .icon-ai   { background: rgba(79,142,247,0.12) !important; }
  .icon-kids { background: rgba(240,184,64,0.12) !important; }

  /* STUDENT CARDS */
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .day-section { margin-bottom: 2.5rem; animation: fadeIn 0.3s ease; }
  .day-header  { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .day-name    { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .day-line    { flex: 1; height: 1px; background: var(--border); }
  .day-count   { font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; }
  .time-group  { margin-bottom: 1rem; }
  .time-label  { font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; direction: ltr; text-align: left; }
  .time-label::before { content: ''; width: 3px; height: 3px; border-radius: 50%; background: var(--accent); }
  .cards-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 10px; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1rem 1.1rem; position: relative; transition: border-color 0.2s, transform 0.15s; overflow: hidden;
  }
  .card::before { content: ''; position: absolute; top: 0; right: 0; width: 3px; height: 100%; background: var(--track-color, var(--border)); border-radius: 0 12px 12px 0; }
  .card.ai-track  { --track-color: var(--ai-color); }
  .card.web-track { --track-color: var(--web-color); }
  .card.private-type { border-color: rgba(240,184,64,0.3); }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .card-head   { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar      { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .avatar.ai   { background: rgba(79,142,247,0.15); color: var(--ai-color); }
  .avatar.web  { background: rgba(56,201,142,0.15); color: var(--web-color); }
  .card-name   { font-size: 14px; font-weight: 700; color: var(--text); }
  .card-meta   { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .private-badge { position: absolute; top: 10px; left: 10px; font-size: 10px; font-weight: 700; background: rgba(240,184,64,0.15); color: var(--gold); border: 1px solid rgba(240,184,64,0.3); border-radius: 6px; padding: 2px 7px; }
  .card-body   { display: flex; flex-direction: column; gap: 6px; }
  .card-row    { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
  .card-row .lbl { color: var(--muted); }
  .card-row .val { color: var(--text); font-weight: 500; direction: ltr; text-align: left; }
  .course-pill { display: inline-block; padding: 2px 9px; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.03em; }
  .course-py   { background: rgba(56,201,142,0.15);  color: #38c98e; }
  .course-html { background: rgba(224,92,92,0.15);   color: #e05c5c; }
  .course-css  { background: rgba(240,184,64,0.15);  color: var(--gold); }
  .course-js   { background: rgba(79,142,247,0.15);  color: var(--ai-color); }
  .course-data { background: rgba(180,100,240,0.15); color: #b464f0; }
  .course-ma   { background: rgba(255,100,180,0.15); color: #ff64b4; }
  .course-min  { background: rgba(100,200,255,0.15); color: #64c8ff; }
  .course-scr  { background: rgba(255,160,50,0.15);  color: #ffa032; }
  .course-aik  { background: rgba(130,255,130,0.15); color: #82ff82; }
  .course-ascr { background: rgba(200,130,255,0.15); color: #c882ff; }
  .completed-chips { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .chip        { font-size: 10px; padding: 1px 6px; border-radius: 5px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .price-free   { color: var(--red); font-weight: 700; }
  .price-normal { color: var(--accent2); }
  .link-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 10px; padding: 7px; border-radius: 8px; border: 1px solid var(--border2);
    background: transparent; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--accent); cursor: pointer; text-decoration: none; transition: all 0.15s; width: 100%; text-align: center;
  }
  .link-btn:hover { background: rgba(79,142,247,0.1); border-color: var(--accent); }
  .card-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .no-results   { text-align: center; padding: 4rem; color: var(--muted); font-size: 14px; }

  /* SPINNER */
  .spinner { display: flex; align-items: center; justify-content: center; padding: 10px 0; }
  .spinner-ring { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2,1fr); }
    .top-bar, .main, #coursesPage { padding: 1rem; }
    .filters-wrap { padding: 0.75rem 1rem; }
    .search-wrap input { width: 130px; }
    .nav-tabs { padding: 0 1rem; }
  }
</style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">📅</div>
    <div class="login-title">لوحة المواعيد</div>
    <div class="login-sub">سجّل دخولك للوصول إلى جدول طلابك</div>
    <div class="field-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="emailInput" placeholder="teacher@example.com" autocomplete="username" />
    </div>
    <div class="field-group">
      <label>كلمة المرور</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnText">دخول</span>
    </button>
    <div class="login-error" id="loginError">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>
  </div>
</div>

<!-- ══════════════════ DASHBOARD ══════════════════ -->
<div id="dashboard">
  <!-- Top bar -->
  <div class="top-bar">
    <div>
      <h1><span class="live-dot"></span> لوحة <span>المواعيد</span></h1>
      <div class="subtitle" id="teacherLabel">—</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      تسجيل الخروج
    </button>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <button class="nav-tab active" id="tabStudents" onclick="switchTab('students')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      جدول الطلاب
    </button>
    <button class="nav-tab" id="tabCourses" onclick="switchTab('courses')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      كورساتي
    </button>
  </div>

  <!-- ── STUDENTS TAB ── -->
  <div id="studentsPage">
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num" id="st-total">—</div><div class="stat-lbl">إجمالي الطلاب</div></div>
      <div class="stat-item"><div class="stat-num" id="st-private">—</div><div class="stat-lbl">حصص خاصة</div></div>
      <div class="stat-item"><div class="stat-num" id="st-days">—</div><div class="stat-lbl">أيام الأسبوع</div></div>
    </div>
    <div class="filters-wrap">
      <label>تصفية:</label>
      <div id="filterBtns"></div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="ابحث باسم الطالب..." oninput="render()" />
      </div>
    </div>
    <div class="main" id="mainContent"></div>
  </div>

  <!-- ── COURSES TAB ── -->
  <div id="coursesPage"></div>
</div>

<script>
const DAY_ORDER = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAY_AR    = {Monday:"الاثنين",Tuesday:"الثلاثاء",Wednesday:"الأربعاء",Thursday:"الخميس",Friday:"الجمعة",Saturday:"السبت",Sunday:"الأحد"};
const COURSE_COLORS = {py:"course-py",html:"course-html",css:"course-css",js:"course-js",data:"course-data",ma:"course-ma",min:"course-min",scr:"course-scr",aik:"course-aik",ascr:"course-ascr"};

// Icons per specialty
const SPEC_ICONS = {
  "Web development":      { icon:"🌐", cls:"icon-web",  cardCls:"spec-web"  },
  "Artificial Intelligence":{ icon:"🤖", cls:"icon-ai",   cardCls:"spec-ai"   },
  "Kids Course":          { icon:"🎮", cls:"icon-kids", cardCls:"spec-kids" },
};

let allStudents    = [];
let allCourses     = {};
let teacherSpecial = [];
let teacherName    = "";
let activeFilter   = "all";

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById("studentsPage").style.display = tab === "students" ? "block" : "none";
  document.getElementById("coursesPage").style.display  = tab === "courses"  ? "block" : "none";
  document.getElementById("tabStudents").classList.toggle("active", tab === "students");
  document.getElementById("tabCourses").classList.toggle("active",  tab === "courses");
}

// ─── Login ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value;
  const btn      = document.getElementById("loginBtn");

  document.getElementById("loginError").classList.remove("show");
  if (!email || !password) { showError("يرجى إدخال البريد وكلمة المرور"); return; }

  btn.disabled = true;
  document.getElementById("loginBtnText").innerHTML = '<div class="spinner"><div class="spinner-ring"></div></div>';

  try {
    // Load teacher.json from data/
    const tRes  = await fetch("teacher.json");
    if (!tRes.ok) throw new Error("teacher.json غير موجود");
    const tData = await tRes.json();
    const teachers = Array.isArray(tData) ? tData : (tData.teachers || [tData]);
    const match = teachers.find(t =>
      t.email.toLowerCase() === email.toLowerCase() && t.password === password
    );
    if (!match) { showError("البريد الإلكتروني أو كلمة المرور غير صحيحة"); return; }

    // Load courses.json from data/
    const cRes = await fetch("courses.json");
    if (!cRes.ok) throw new Error("data/courses.json غير موجود");
    allCourses     = await cRes.json();
    teacherSpecial = match.special || [];

    // Load students
    const sRes = await fetch("data.json");
    if (!sRes.ok) throw new Error("data.json غير موجود");
    const sRaw = await sRes.json();
    allStudents = flattenStudents(sRaw).filter(s => s.teacher === match.code);
    teacherName = match.name || match.email;

    document.getElementById("teacherLabel").textContent = `مرحباً، ${teacherName} · ${teacherSpecial.join(" · ")}`;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display   = "block";

    renderCourses();
    render();
    switchTab("students");

  } catch (e) {
    showError("⚠️ " + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById("loginBtnText").textContent = "دخول";
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none") doLogin();
});

function showError(msg) {
  const el = document.getElementById("loginError");
  el.textContent = msg;
  el.classList.add("show");
}

function doLogout() {
  allStudents = []; allCourses = {}; teacherSpecial = []; teacherName = ""; activeFilter = "all";
  document.getElementById("emailInput").value    = "";
  document.getElementById("passwordInput").value = "";
  document.getElementById("loginError").classList.remove("show");
  document.getElementById("dashboard").style.display   = "none";
  document.getElementById("loginScreen").style.display = "flex";
}

// ─── Courses Render ───────────────────────────────────────────────────────────
function renderCourses() {
  // Group courses by specialty, only those matching teacher's specials
  const bySpec = {};
  Object.entries(allCourses).forEach(([key, c]) => {
    if (!teacherSpecial.includes(c.special)) return;
    if (!bySpec[c.special]) bySpec[c.special] = [];
    bySpec[c.special].push({ key, ...c });
  });

  if (!Object.keys(bySpec).length) {
    document.getElementById("coursesPage").innerHTML =
      '<div class="no-results">لا توجد كورسات مرتبطة بتخصصك</div>';
    return;
  }

  document.getElementById("coursesPage").innerHTML = Object.entries(bySpec).map(([spec, courses]) => {
    const si = SPEC_ICONS[spec] || { icon:"📚", cls:"", cardCls:"" };

    const cardsHTML = courses.map(c => `
      <div class="course-card ${si.cardCls}">
        <div class="course-card-icon ${si.cls}">${si.icon}</div>
        <div class="course-card-name">${c.course_name}</div>
        <div class="course-card-rank">${c.rank}</div>
        <div class="course-card-meta">
          <div class="course-card-dur">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            ${c.duration}
          </div>
          <div class="course-card-key">${c.key.toUpperCase()}</div>
        </div>
        <a class="course-card-link" href="${c.link}" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3M10 2h4m0 0v4m0-4L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          فتح المنهج
        </a>
      </div>`).join("");

    return `
      <div class="spec-section">
        <div class="spec-header">
          <div class="spec-name">${si.icon} ${spec}</div>
          <div class="spec-line"></div>
          <div class="spec-count">${courses.length} كورس</div>
        </div>
        <div class="courses-grid">${cardsHTML}</div>
      </div>`;
  }).join("");
}

// ─── Students Render ──────────────────────────────────────────────────────────
function getInitials(name) {
  const p = name.trim().split(" ");
  return p.length >= 2 ? p[0][0] + p[1][0] : p[0].slice(0,2);
}
function toMinutes(timeStr) {
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]) % 12;
  if (m[3].toUpperCase() === "PM") h += 12;
  return h * 60 + parseInt(m[2]);
}
function flattenStudents(raw) {
  const result = [];
  function walk(item) {
    if (Array.isArray(item)) item.forEach(walk);
    else if (item && typeof item === "object" && item.name) result.push(item);
  }
  walk(raw.students || raw);
  return result;
}

function renderStats(students) {
  document.getElementById("st-total").textContent   = students.length;
  document.getElementById("st-private").textContent = students.filter(s=>s.type==="Private"||s.type==="private").length;

  document.getElementById("st-days").textContent    = new Set(students.map(s=>s.Day)).size;
}

function renderFilters() {
  const days = [...new Set(allStudents.map(s=>s.Day))].sort((a,b)=>DAY_ORDER.indexOf(a)-DAY_ORDER.indexOf(b));
  const defs = [
    {v:"all",       l:"الكل",     cls:""},
    ...days.map(d=>({v:d, l:DAY_AR[d]||d, cls:""})),
    {v:"AI Track",  l:"AI Track", cls:""},
    {v:"Web Track", l:"Web Track",cls:"web"},
    {v:"Private",   l:"خاص",     cls:"gold"},
  ];
  document.getElementById("filterBtns").innerHTML = defs.map(d=>
    `<button class="filter-btn${activeFilter===d.v?" active "+d.cls:""}" onclick="setFilter('${d.v}')">${d.l}</button>`
  ).join(" ");
}

function setFilter(f) { activeFilter = f; render(); }
window.setFilter = setFilter;

function render() {
  const search = (document.getElementById("searchInput")?.value||"").trim().toLowerCase();
  let students = allStudents.filter(s => {
    if (activeFilter !== "all") {
      if (activeFilter === "AI Track" || activeFilter === "Web Track") {
        if (s.track !== activeFilter) return false;
      } else if (activeFilter === "Private") {
        if (s.type !== "Private" && s.type !== "private") return false;
      } else {
        if (s.Day !== activeFilter) return false;
      }
    }
    if (search && !s.name.toLowerCase().includes(search)) return false;
    return true;
  });

  renderStats(students);
  renderFilters();

  if (!students.length) {
    document.getElementById("mainContent").innerHTML = '<div class="no-results">لا يوجد طلاب مطابقون</div>';
    return;
  }

  const byDay = {};
  students.forEach(s => {
    if (!byDay[s.Day]) byDay[s.Day] = {};
    if (!byDay[s.Day][s.Time]) byDay[s.Day][s.Time] = [];
    byDay[s.Day][s.Time].push(s);
  });

  const sortedDays = Object.keys(byDay).sort((a,b)=>DAY_ORDER.indexOf(a)-DAY_ORDER.indexOf(b));

  document.getElementById("mainContent").innerHTML = sortedDays.map(day => {
    const timeGroups  = byDay[day];
    const sortedTimes = Object.keys(timeGroups).sort((a,b)=>toMinutes(a)-toMinutes(b));

    const timeHTML = sortedTimes.map(time => {
      const cardsHTML = timeGroups[time].map(s => {
        const isAI       = s.track === "AI Track";
        const isPrivate  = s.type === "Private" || s.type === "private";
        const trackClass = isAI ? "ai-track" : "web-track";

        const completed  = s.completed_courses?.length
          ? s.completed_courses.map(c=>`<span class="chip">${c.toUpperCase()}</span>`).join("")
          : `<span class="chip">—</span>`;
        const courseColor = COURSE_COLORS[s.current_course] || "";
        const link = (s.link||"").trim();

        // Enrich current course name from courses.json
        const courseInfo = allCourses[s.current_course];
        const coursePill = courseInfo
          ? `<span class="course-pill ${courseColor}" title="${courseInfo.course_name}">${courseInfo.course_name}</span>`
          : `<span class="course-pill ${courseColor}">${s.current_course.toUpperCase()}</span>`;

        return `
          <div class="card ${trackClass}${isPrivate?" private-type":""}">
            ${isPrivate ? '<div class="private-badge">خاص</div>' : ""}
            <div class="card-head">
              <div class="avatar ${isAI?"ai":"web"}">${getInitials(s.name)}</div>
              <div>
                <div class="card-name">${s.name}</div>
                <div class="card-meta">${s.id} · ${s.age} سنة · ${s.track}</div>
              </div>
            </div>
            <div class="card-divider"></div>
            <div class="card-body">
              <div class="card-row">
                <span class="lbl">الكورس الحالي</span>
                <span class="val">${coursePill}</span>
              </div>
              <div class="card-row">
                <span class="lbl">أتمّ</span>
                <span class="val"><div class="completed-chips">${completed}</div></span>
              </div>
              <div class="card-row">
                <span class="lbl">الهاتف</span>
                <span class="val" dir="ltr">${s.phone_number||"—"}</span>
              </div>

            </div>
            ${link?`<a class="link-btn" href="${link}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3M10 2h4m0 0v4m0-4L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              فتح لينك الحصة</a>`:""}
          </div>`;
      }).join("");

      return `
        <div class="time-group">
          <div class="time-label">${time}</div>
          <div class="cards-grid">${cardsHTML}</div>
        </div>`;
    }).join("");

    const total = Object.values(timeGroups).flat().length;
    return `
      <div class="day-section">
        <div class="day-header">
          <div class="day-name">${DAY_AR[day]||day}</div>
          <div class="day-line"></div>
          <div class="day-count">${total} طالب</div>
        </div>
        ${timeHTML}
      </div>`;
  }).join("");
}
</script>
</body>
</html>
